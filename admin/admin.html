<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | مدونة المعرفة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --admin-primary: #1e293b;
            --admin-accent: #3b82f6;
        }

        body {
            background-color: #f8fafc;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 280px;
            background: var(--admin-primary);
            color: white;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            right: 0;
            z-index: 100;
        }

        .admin-main {
            flex-grow: 1;
            margin-right: 280px;
            padding: 40px;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
        }

        .sidebar-nav li {
            margin-bottom: 10px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            color: #94a3b8;
            font-weight: 600;
            transition: var(--transition);
        }

        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .admin-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn-ai {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-ai:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .articles-table {
            width: 100%;
            border-collapse: collapse;
        }

        .articles-table th, .articles-table td {
            text-align: right;
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .articles-table th {
            color: var(--text-muted);
            font-weight: 700;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .badge-cat { background: #e0f2fe; color: #0369a1; }

        .actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-edit:hover { background: #dcfce7; color: #15803d; border-color: #15803d; }
        .btn-delete:hover { background: #fee2e2; color: #b91c1c; border-color: #b91c1c; }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }

        @media (max-width: 1024px) {
            .admin-sidebar { width: 80px; padding: 30px 10px; }
            .sidebar-logo, .sidebar-nav span { display: none; }
            .admin-main { margin-right: 80px; }
        }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h1 class="logo" style="margin-bottom: 30px;">مدونة<span>المعرفة</span></h1>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="admin-pass" placeholder="أدخل كلمة مرور المسؤول...">
            </div>
            <button class="btn-submit" style="width: 100%; margin-top: 20px;" onclick="checkLogin()">دخول</button>
            <p id="login-error" style="color: red; margin-top: 15px; display: none;">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <div class="admin-layout" id="admin-content" style="display: none;">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-logo">لوحة التحكم</div>
            <ul class="sidebar-nav">
                <li><a href="#" class="active" onclick="switchTab('dashboard')"><i class="fas fa-home"></i> <span>الرئيسية</span></a></li>
                <li><a href="#" onclick="switchTab('add')"><i class="fas fa-plus-circle"></i> <span>إضافة مقال</span></a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>خروج</span></a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            
            <!-- Tab: Dashboard -->
            <section id="tab-dashboard">
                <div class="admin-header">
                    <h2>إدارة المقالات</h2>
                    <button class="btn-submit" onclick="switchTab('add')"><i class="fas fa-plus"></i> إضافة مقال جديد</button>
                </div>

                <div class="admin-card">
                    <table class="articles-table">
                        <thead>
                            <tr>
                                <th>المقال</th>
                                <th>التصنيف</th>
                                <th>التاريخ</th>
                                <th>المشاهدات</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="articles-list">
                            <!-- JS Render -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Tab: Add/Edit Article -->
            <section id="tab-add" style="display: none;">
                <div class="admin-header">
                    <h2 id="form-title">إضافة مقال جديد</h2>
                    <button class="btn-ai" id="btn-generate" onclick="generateAI()">
                        <i class="fas fa-magic"></i> توليد بالذكاء الاصطناعي
                    </button>
                </div>

                <div class="admin-card">
                    <form id="article-form">
                        <input type="hidden" id="article-id">
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>العنوان</label>
                            <input type="text" id="title" placeholder="عنوان المقال..." required>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                            <div class="form-group">
                                <label>التصنيف</label>
                                <select id="category">
                                    <option>أخبار</option>
                                    <option>وظائف</option>
                                    <option>الهجرة</option>
                                    <option>الطبخ</option>
                                    <option>تعليم السياقة</option>
                                    <option>رياضة</option>
                                    <option>أفلام ومسلسلات</option>
                                    <option>الربح من الإنترنت</option>
                                    <option>إصلاح الإلكترونيات</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>رابط الصورة</label>
                                <input type="text" id="image" placeholder="https://unsplash.com/...">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>المحتوى (HTML أو نص)</label>
                            <textarea id="content" rows="12" placeholder="اكتب محتوى المقال هنا..."></textarea>
                        </div>

                        <div class="form-group" style="margin-bottom: 30px; background: #eff6ff; padding: 20px; border-radius: 12px;">
                            <label><i class="fas fa-lightbulb" style="color: #3b82f6;"></i> ملاحظات / برومبت للذكاء الاصطناعي</label>
                            <textarea id="notes" rows="3" placeholder="أضف تعليمات إضافية لـ Gemini (مثلاً: أضف نصائح عملية، اجعل الأسلوب بسيطاً...)"></textarea>
                        </div>

                        <div style="display: flex; gap: 15px;">
                            <button type="submit" class="btn-submit">حفظ ونشر المقال</button>
                            <button type="button" class="pill" onclick="switchTab('dashboard')">إلغاء</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
