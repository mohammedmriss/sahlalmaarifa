backend:
  name: git-gateway
  branch: main # Change to 'master' if your repo uses it

media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "content"
    label: "المحتوى"
    files:
      - label: "المقالات"
        name: "articles"
        file: "articles.json"
        fields:
          - name: "posts"
            label: "قائمة المقالات"
            widget: "list"
            fields:
              - { label: "المعرف (رقم)", name: "id", widget: "number", value_type: "int" }
              - { label: "العنوان", name: "title", widget: "string" }
              - { label: "التصنيف", name: "category", widget: "select", options: ["أخبار", "وظائف", "الهجرة", "الطبخ", "تعليم السياقة", "رياضة", "أفلام ومسلسلات", "الربح من الإنترنت", "إصلاح الإلكترونيات"] }
              - { label: "التاريخ", name: "date", widget: "datetime" }
              - { label: "الصورة", name: "image", widget: "image" }
              - { label: "محتوى المقال", name: "content", widget: "markdown" }
