backend:
  name: git-gateway
  branch: main

media_folder: assets/img
public_folder: /assets/img

collections:
  - name: blog
    label: المقالات
    folder: _posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - {
          label: "Category",
          name: "category",
          widget: "select",
          options:
            [
              "أخبار",
              "وظائف",
              "الهجرة",
              "الطبخ",
              "تعليم السياقة",
              "رياضة",
              "أفلام ومسلسلات",
              "الربح من الإنترنت",
              "إصلاح الإلكترونيات",
            ],
        }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown" }
